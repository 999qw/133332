<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赵元贞集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<script src="data-jinshang.js" defer></script>
<script src="data-suibi.js" defer></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --ink:        #1a1410;
  --ink-light:  #2a2218;
  --paper:      #e8dcc8;
  --paper-dim:  #c4b69c;
  --gold:       #c9a96e;
  --gold-light: #e0c992;
  --gold-dim:   #8b7355;
  --border-dim: rgba(201,169,110,0.12);
  --font-serif: 'Noto Serif SC','Source Han Serif SC','STSong',serif;
  --font-sans:  'Noto Sans SC','PingFang SC',sans-serif;
  --nav-h: 64px;
  --side-pad: clamp(24px, 6vw, 80px);
}

html { scroll-behavior: smooth; background: var(--ink); }
body {
  font-family: var(--font-serif); color: var(--paper);
  background: var(--ink); overflow-x: hidden; line-height: 1.8;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--ink); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

/* ===== Nav ===== */
nav {
  position: fixed; top:0; left:0; right:0; z-index:100;
  height: var(--nav-h);
  padding: 0 var(--side-pad);
  display:flex; align-items:center; justify-content:center;
  background: transparent;
  transition: background 0.4s, box-shadow 0.4s;
}
nav.scrolled {
  background: rgba(26,20,16,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 1px 0 var(--border-dim);
}
.nav-links { display:flex; gap:2.5rem; }
.nav-links a {
  position:relative;
  font-family: var(--font-sans);
  font-size:0.82rem; font-weight:700; letter-spacing:0.08em;
  color:var(--paper-dim); text-decoration:none; text-transform:uppercase;
  padding:4px 0; cursor:pointer; transition:color 0.25s;
}
.nav-links a::after {
  content:''; position:absolute; bottom:0; left:0; right:0;
  height:1.5px; background:var(--gold);
  transform:scaleX(0); transform-origin:right;
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.nav-links a:hover { color:var(--gold); }
.nav-links a:hover::after { transform:scaleX(1); transform-origin:left; }

/* ===== Hero ===== */
.hero {
  position:relative; min-height:100vh;
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.hero-bg {
  position:absolute; inset:0; background:var(--ink);
}
.hero-bg img {
  width:100%; height:100%; object-fit:cover;
  mix-blend-mode:overlay; opacity:0.35;
  filter:saturate(0.8) brightness(0.7);
  will-change:transform;
}
.hero-overlay {
  position:absolute; inset:0;
  background:radial-gradient(ellipse at center, transparent 30%, var(--ink) 80%);
}
.hero-content {
  position:relative; z-index:2; text-align:center; padding:0 var(--side-pad);
}
.hero-quote {
  font-family:var(--font-serif);
  font-size:clamp(0.85rem,1.3vw,1.05rem);
  color:var(--gold-dim); margin-bottom:1.8rem;
  min-height:1.8em; line-height:1.6; transition:opacity 0.5s;
}
.hero-quote::before { content:'\201C'; }
.hero-quote::after  { content:'\201D'; }
.hero-title {
  font-size:clamp(2.8rem,12vw,8rem); font-weight:300;
  line-height:0.95; letter-spacing:0.06em; color:var(--paper); margin-bottom:1.2rem;
}
.hero-title .second-line { color:var(--gold); }
.hero-sub {
  font-size:clamp(0.9rem,1.4vw,1.15rem);
  color:var(--paper-dim); letter-spacing:0.15em;
}
.hero-scroll-indicator {
  position:absolute; bottom:2rem; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:6px; opacity:0.6;
  animation:bounceFloat 2.5s ease-in-out infinite;
}
.hero-scroll-indicator span {
  font-family:var(--font-sans); font-size:0.65rem;
  letter-spacing:0.2em; color:var(--gold-dim); text-transform:uppercase;
}
.hero-scroll-indicator .line {
  width:1px; height:28px;
  background:linear-gradient(to bottom,var(--gold-dim),transparent);
}

/* ===== Sections ===== */
section { padding:100px var(--side-pad); }
.section-header { text-align:center; margin-bottom:60px; }
.section-header .num {
  font-family:var(--font-sans); font-size:0.75rem;
  letter-spacing:0.25em; color:var(--gold-dim); margin-bottom:0.8rem;
}
.section-header h2 {
  font-size:clamp(1.8rem,4vw,3rem); font-weight:300;
  letter-spacing:0.08em; color:var(--paper);
}
.section-header .divider {
  width:40px; height:1.5px; background:var(--gold); margin:1rem auto 0;
}

/* ===== Book Cards ===== */
.books-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:clamp(16px,2vw,30px); max-width:1200px; margin:0 auto;
}
.book-card {
  position:relative; aspect-ratio:4/5; overflow:hidden; cursor:pointer;
  background:var(--ink-light); border:1px solid var(--border-dim);
  transition:border-color 0.4s, transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.book-card:hover { border-color:var(--gold-dim); transform:translateY(-4px); }
.book-card img {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; mix-blend-mode:hard-light; opacity:0.25;
  transition:opacity 0.5s, transform 0.6s;
}
.book-card:hover img { opacity:0.4; transform:scale(1.05); }
.book-card .card-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to top, var(--ink) 10%, transparent 60%);
}
.book-card .card-content {
  position:absolute; bottom:0; left:0; right:0; padding:30px 28px;
}
.book-card .card-label {
  font-family:var(--font-sans); font-size:0.7rem;
  letter-spacing:0.2em; color:var(--gold-dim); margin-bottom:6px;
}
.book-card .card-title {
  font-size:clamp(1.3rem,2.2vw,1.8rem); font-weight:600;
  color:var(--paper); margin-bottom:4px;
}
.book-card .card-count { font-size:0.8rem; color:var(--paper-dim); }
.book-card .card-arrow {
  position:absolute; top:24px; right:24px;
  width:32px; height:32px; border:1px solid var(--border-dim);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:0.8rem; color:var(--gold-dim);
  transition:background 0.3s, color 0.3s, transform 0.3s;
}
.book-card:hover .card-arrow {
  background:var(--gold); color:var(--ink); transform:rotate(45deg);
}

/* ===== Separator ===== */
.separator {
  position:relative; height:50vh; min-height:320px; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.separator img {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; mix-blend-mode:overlay; opacity:0.25;
  filter:saturate(0.7) brightness(0.6); will-change:transform;
}
.separator .sep-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to bottom, var(--ink) 0%, transparent 30%, transparent 70%, var(--ink) 100%);
}
.separator .sep-text {
  position:relative; z-index:2;
  font-size:clamp(0.9rem,1.6vw,1.2rem); font-weight:300; line-height:1.7;
  max-width:720px; margin:0 auto; padding:0 var(--side-pad); text-align:center;
}
.separator .sep-text span { display:block; transition:opacity 0.6s; }

/* ===== Reading Area ===== */
.reading-area { display:none; }
.reading-area.active { display:block; }

/* Article list */
.article-list-section { padding:80px var(--side-pad); }
.article-list-header {
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:40px; max-width:900px; margin-left:auto; margin-right:auto;
}
.article-list-header h2 {
  font-size:clamp(1.4rem,2.5vw,2rem); font-weight:300; color:var(--paper);
}
.article-list-header .back-btn {
  font-family:var(--font-sans); font-size:0.78rem; font-weight:700;
  letter-spacing:0.08em; color:var(--gold-dim); cursor:pointer;
  text-decoration:none; text-transform:uppercase; transition:color 0.25s;
  background:none; border:none;
}
.article-list-header .back-btn:hover { color:var(--gold); }
.article-list {
  max-width:900px; margin:0 auto;
  display:grid; gap:2px;
  background:var(--border-dim);
}
.article-list-item {
  background:var(--ink); padding:18px 24px;
  cursor:pointer; transition:background 0.25s;
  display:flex; justify-content:space-between; align-items:baseline; gap:16px;
}
.article-list-item:hover { background:var(--ink-light); }
.article-list-item .item-title {
  font-size:0.95rem; color:var(--paper); line-height:1.5;
}
.article-list-item .item-meta {
  font-family:var(--font-sans); font-size:0.72rem;
  color:var(--gold-dim); white-space:nowrap; flex-shrink:0;
}

/* Article reading */
.article-view {
  max-width:720px; margin:0 auto; padding:60px var(--side-pad) 80px;
}
.article-view .article-back {
  display:inline-block;
  font-family:var(--font-sans); font-size:0.78rem; font-weight:700;
  letter-spacing:0.08em; color:var(--gold-dim); cursor:pointer;
  text-decoration:none; text-transform:uppercase; margin-bottom:40px;
  transition:color 0.25s; background:none; border:none;
}
.article-view .article-back:hover { color:var(--gold); }
.article-view h2 {
  font-size:clamp(1.4rem,2.5vw,2rem); font-weight:600;
  color:var(--paper); margin-bottom:8px;
}
.article-view .article-meta {
  font-family:var(--font-sans); font-size:0.82rem;
  color:var(--gold-dim); margin-bottom:32px;
  padding-bottom:16px; border-bottom:1px solid var(--border-dim);
}
.article-view .article-body p {
  margin-bottom:16px; text-indent:2em; line-height:2;
  font-size:1.05em; color:var(--paper);
}
.article-view .article-body .annotation {
  font-family:'Kaiti SC','KaiTi','STKaiti','楷体',var(--font-serif),serif;
  color:var(--gold-dim); text-indent:0; font-size:0.95em;
  padding:8px 14px; margin-top:12px;
  background:rgba(201,169,110,0.06);
  border-left:2px solid var(--gold-dim);
  border-radius:0 4px 4px 0;
}
.article-view .comments-section {
  margin-top:48px; padding-top:24px;
  border-top:1px solid var(--border-dim);
}
.article-view .comments-section h3 {
  font-size:1em; font-family:var(--font-sans);
  color:var(--gold-dim); margin-bottom:16px; letter-spacing:0.1em;
}

/* ===== Footer ===== */
footer {
  padding:40px var(--side-pad);
  border-top:1px solid var(--border-dim);
  display:flex; justify-content:center;
  font-family:var(--font-sans); font-size:0.75rem; color:var(--gold-dim);
}
footer .footer-links { display:flex; gap:1.5rem; }
footer .footer-links a {
  color:var(--gold-dim); text-decoration:none; transition:color 0.25s;
}
footer .footer-links a:hover { color:var(--gold); }

/* ===== Animations ===== */
@keyframes bounceFloat {
  0%,100% { transform:translateX(-50%) translateY(0); }
  50%     { transform:translateX(-50%) translateY(8px); }
}
.reveal {
  opacity:0; transform:translateY(40px);
  transition:opacity 0.8s, transform 0.8s cubic-bezier(0.4,0,0.2,1);
}
.reveal.visible { opacity:1; transform:translateY(0); }

/* ===== Responsive ===== */
@media (max-width:768px) {
  .nav-links { gap:1.2rem; }
  .nav-links a { font-size:0.7rem; }
  .books-grid { grid-template-columns:1fr; }
  .article-list-item { flex-direction:column; gap:4px; }
  .article-list-item .item-meta { white-space:normal; }
  .article-view { padding:40px 20px 60px; }
  .article-view .article-body p { font-size:1em; }
}
@media (max-width:480px) {
  .nav-links a:nth-child(n+3) { display:none; }
}
</style>
</head>
<body>

<!-- ===== Nav ===== -->
<nav id="navbar">
  <div class="nav-links">
    <a onclick="scrollToSection('books')">卷目</a>
    <a onclick="scrollToSection('reading')">阅读</a>
    <a onclick="scrollToSection('top')">首页</a>
  </div>
</nav>

<!-- ===== Hero ===== -->
<section class="hero" id="top">
  <div class="hero-bg">
    <img src="pictures/warm_graded/882ae6ed00a9f60fb26d172400997414.jpg" alt="" aria-hidden="true">
  </div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-quote" id="heroQuote"></p>
    <h1 class="hero-title">
      <span>赵元贞集</span>
      <span class="second-line">Zhao Yuanzhen</span>
    </h1>
    <p class="hero-sub">今上实录 · 随笔 · 未分类</p>
  </div>
  <div class="hero-scroll-indicator">
    <span>滚动</span>
    <div class="line"></div>
  </div>
</section>

<!-- ===== Books ===== -->
<section id="books">
  <div class="section-header reveal">
    <p class="num">I · 卷</p>
    <h2>文集三卷</h2>
    <div class="divider"></div>
  </div>
  <div class="books-grid">
    <div class="book-card reveal" onclick="openBook('今上实录')">
      <img src="pictures/warm_graded/体仁阁.jpg" alt="" aria-hidden="true" style="object-position:center 30%;">
      <div class="card-overlay"></div>
      <div class="card-arrow">→</div>
      <div class="card-content">
        <p class="card-label">卷一</p>
        <h3 class="card-title">今上实录</h3>
        <p class="card-count">诗词 · 骈文 · 杂记</p>
      </div>
    </div>
    <div class="book-card reveal" onclick="openBook('随笔')">
      <img src="pictures/warm_graded/与谁同坐轩.jpg" alt="" aria-hidden="true" style="object-position:center 100%;">
      <div class="card-overlay"></div>
      <div class="card-arrow">→</div>
      <div class="card-content">
        <p class="card-label">卷二</p>
        <h3 class="card-title">随笔</h3>
        <p class="card-count">散文 · 杂感</p>
      </div>
    </div>
    <div class="book-card reveal" onclick="openBook('未分类')">
      <img src="pictures/warm_graded/嵩山.jpg" alt="" aria-hidden="true" style="object-position:center 35%;">
      <div class="card-overlay"></div>
      <div class="card-arrow">→</div>
      <div class="card-content">
        <p class="card-label">卷三</p>
        <h3 class="card-title">未分类</h3>
        <p class="card-count">杂文 · 考据</p>
      </div>
    </div>
  </div>
</section>

<!-- ===== Separator ===== -->
<div class="separator reveal">
  <img src="pictures/warm_graded/f166950c9955dc974e58a3da76e0492b.jpg" alt="" aria-hidden="true">
  <div class="sep-overlay"></div>
  <div class="sep-text"><span id="sepQuote"></span></div>
</div>

<!-- ===== Reading Area ===== -->
<section id="reading" class="reading-area">
  <!-- Article List (shown when a book is selected) -->
  <div id="articleList" class="article-list-section">
    <div class="article-list-header">
      <h2 id="listTitle">文集</h2>
      <button class="back-btn" onclick="closeBook()">← 返回卷目</button>
    </div>
    <div class="article-list" id="articleListItems"></div>
  </div>

  <!-- Article View (shown when an article is selected) -->
  <div id="articleView" class="article-view" style="display:none;">
    <button class="article-back" onclick="showList()">← 返回目录</button>
    <h2 id="articleTitle"></h2>
    <div class="article-meta" id="articleMeta"></div>
    <div class="article-body" id="articleBody"></div>
    <div class="comments-section">
      <h3>评论区</h3>
      <div id="cusdis_thread"></div>
    </div>
  </div>
</section>

<!-- ===== Footer ===== -->
<footer class="reveal">
  <div class="footer-links">
    <a href="#top">返回首页</a>
    <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
  </div>
</footer>

<!-- ===== JS ===== -->
<script>
// ===== DATA LAYER =====
let allData = {};

function escapeHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function initData() {
  const jinshangData = window.JINSHANG_DATA || {};
  const suibiData = window.SUIBI_DATA || {};

  // Parse 今上实录: keys are section names, values are arrays of articles
  const jinshangFlat = [];
  for (const [section, articles] of Object.entries(jinshangData)) {
    if (Array.isArray(articles)) {
      articles.forEach(a => jinshangFlat.push({ ...a, section }));
    }
  }
  allData['今上实录'] = jinshangFlat;

  // Parse 随笔 & 未分类 from suibi.js (keys: "随笔", "未分类")
  allData['随笔'] = suibiData['随笔'] || [];
  allData['未分类'] = suibiData['未分类'] || [];

  console.log('Data loaded:', {
    今上实录: jinshangFlat.length,
    随笔: suibiList.length,
    未分类: weifenleiList.length
  });
}

// ===== BOOK NAVIGATION =====
function openBook(bookName) {
  const items = allData[bookName];
  if (!items || items.length === 0) {
    document.getElementById('articleListItems').innerHTML =
      '<p style="color:var(--gold-dim);text-align:center;padding:40px;">暂无内容</p>';
    return;
  }

  document.getElementById('listTitle').textContent = bookName;
  const listEl = document.getElementById('articleListItems');
  listEl.innerHTML = '';

  items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'article-list-item';
    // Truncate overly long titles (PDF parsing artifact)
    let displayTitle = item.title || '标题';
    const MAX_TITLE = 60;
    if (displayTitle.length > MAX_TITLE) {
      // Extract just the date/prefix part
      const m = displayTitle.match(/^(标题\s+\d{4}\s*年.*?字\s+)/);
      if (m) displayTitle = m[1] + '…';
      else displayTitle = displayTitle.substring(0, MAX_TITLE) + '…';
    }
    div.innerHTML = `
      <span class="item-title">${escapeHtml(displayTitle)}</span>
      <span class="item-meta">${escapeHtml(item.date || '')}</span>
    `;
    div.addEventListener('click', () => showArticle(bookName, idx));
    listEl.appendChild(div);
  });

  // Show reading area
  document.getElementById('reading').classList.add('active');
  document.getElementById('articleList').style.display = 'block';
  document.getElementById('articleView').style.display = 'none';

  // Scroll to reading section
  document.getElementById('reading').scrollIntoView({ behavior: 'smooth' });
}

function closeBook() {
  document.getElementById('reading').classList.remove('active');
  document.getElementById('reading').scrollIntoView({ behavior: 'smooth' });
}

function showList() {
  document.getElementById('articleList').style.display = 'block';
  document.getElementById('articleView').style.display = 'none';
}

// ===== ARTICLE VIEW =====
let currentBook = '';
let currentIdx = 0;

function showArticle(bookName, idx) {
  currentBook = bookName;
  currentIdx = idx;
  const items = allData[bookName];
  if (!items || !items[idx]) return;

  const item = items[idx];
  document.getElementById('articleList').style.display = 'none';
  document.getElementById('articleView').style.display = 'block';

  let title = item.title || '标题';
  let raw = item.content || '';

  // Fix Issue 1: title contains full article content (PDF parsing artifact)
  const HAS_EMBEDDED_CONTENT = title.length > 80 && raw.length > 0;
  if (HAS_EMBEDDED_CONTENT) {
    // If title is extremely long and content also exists, the title likely
    // stole content meant for a different article. Use the date-prefix as title.
    const m = title.match(/^(标题\s+\d{4}\s*年[^|]+\|\s*\d+字\s+)/);
    if (m) {
      raw = title.replace(m[1], '').trim() + '\n\n' + raw;
      title = m[1].trim();
    } else {
      // Just use first part as title
      raw = title + '\n\n' + raw;
      title = title.substring(0, 40) + '…';
    }
  }

  // Fix Issue 3: clean stray PDF page numbers at line starts
  raw = raw.replace(/\n(\d+)\s/g, '\n');

  // Clean date remnants at start of content (from PDF line-break extraction)
  raw = raw.replace(/^[\d\s\n]*?(?:年\d*)?(?:月\d*)?(?:日\s*[\d:]+\s*\|?\s*\d*\s*字?)\s*/m, '').trim();
  // Also clean multi-line date prefix pattern
  raw = raw.replace(/^\d{4}\s*\n\s*年\d*\s*\n?\s*月\d*\s*\n?\s*日[^\n]*\n?/, '').trim();

  document.getElementById('articleTitle').textContent = title;
  document.getElementById('articleMeta').textContent = item.date || '';

  // Parse content
  const bodyEl = document.getElementById('articleBody');
  bodyEl.innerHTML = '';

  // Split by || for annotations, then by \n\n for paragraphs
  const blocks = raw.split('\n\n');
  blocks.forEach((block, bi) => {
    block = block.trim();
    if (!block) return;
    
    // Check if this is an annotation
    if (block.startsWith('||')) {
      const ann = document.createElement('p');
      ann.className = 'annotation';
      ann.textContent = block.replace(/^\|\|\s*/, '');
      bodyEl.appendChild(ann);
      return;
    }
    
    // Check if this is the LAST block and might be a stray title
    const isLastBlock = (bi === blocks.length - 1);
    if (isLastBlock && block.length < 10 && 
        !block.endsWith('。') && !block.endsWith('？') && !block.endsWith('！') &&
        !block.endsWith('）') && !block.endsWith('」') && !block.endsWith('》') &&
        block.length > 1) {
      // Check if the previous block is also short (poetry pattern) - keep it
      const prevBlock = bi > 0 ? blocks[bi-1].trim() : '';
      if (prevBlock && prevBlock.length >= 10) {
        // Previous block is long prose, this short line is likely a stray title
        return; // skip rendering this block
      }
    }
    
    const p = document.createElement('p');
    p.textContent = block;
    bodyEl.appendChild(p);
  });

  initCusdis(bookName, idx);
  document.getElementById('reading').scrollIntoView({ behavior: 'smooth' });
}

// ===== CUSDIS =====
function initCusdis(bookName, idx) {
  const container = document.getElementById('cusdis_thread');
  if (!container) return;

  const pageId = `${bookName}-${idx}`;
  const pageTitle = document.getElementById('articleTitle')?.textContent || '';
  const pageUrl = window.location.href.split('?')[0] + '#' + pageId;

  // Cusdis re-renders on data changes — set attributes then re-mount
  container.setAttribute('data-host', 'https://cusdis.com');
  container.setAttribute('data-app-id', '2392e3c4-004c-46f3-8b25-75cca2d78d25');
  container.setAttribute('data-page-id', pageId);
  container.setAttribute('data-page-url', pageUrl);
  container.setAttribute('data-page-title', pageTitle);
  container.setAttribute('data-theme', 'dark');

  // Trigger Cusdis re-render
  if (window.CUSDIS && typeof window.CUSDIS.render === 'function') {
    window.CUSDIS.render();
  } else {
    // First load — inject the widget script
    container.innerHTML = '';
    const script = document.createElement('script');
    script.src = 'https://cusdis.com/js/cusdis.es.js';
    script.async = true;
    script.defer = true;
    container.appendChild(script);
  }
}

// ===== SCROLL REVEAL =====
const observer = new IntersectionObserver(
  entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
  { threshold: 0.15, rootMargin: '0px 0px -40px 0px' }
);
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
